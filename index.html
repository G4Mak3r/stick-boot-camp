<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#16120b" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Stick Boot Camp: Side Range</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="rotateOverlay" aria-hidden="true">
    <div class="phoneIcon"><div class="notch"></div><div class="screenLine"></div></div>
    <h1>Поверни телефон горизонтально</h1>
    <p>Игра запускается только в landscape</p>
  </div>
  <canvas id="game" aria-label="Stick Boot Camp game canvas"></canvas>
  <div id="touchLayer" aria-hidden="true">
    <div id="leftPad" class="pad"><div id="stickKnob"></div></div>
    <button id="jumpBtn" class="touchBtn">JUMP</button>
    <button id="fireBtn" class="touchBtn fire">FIRE</button>
    <button id="reloadBtn" class="touchBtn small">R</button>
    <button id="weaponBtn" class="touchBtn small">WPN</button>
  </div>
  <script type="module" src="src/main.js"></script>
</body>
</html>
