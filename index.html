<body>
<div id="wrap"><canvas id="c"></canvas></div>
<div class="portrait"><div class="phone"></div><div class="arrow">↻</div><h1>Поверни телефон горизонтально</h1><p>Boot camp начинается только в landscape.</p></div>
<script>
(()=>{
'use strict';
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d',{alpha:false});
const TAU=Math.PI*2,R=Math.random,PI=Math.PI;

const world={w:1800,h:980};
const keys={};
const joy={id:null,x:0,y:0,dx:0,dy:0,r:68,active:false};
const shoot={id:null,down:false,x:0,y:0};
const buttons={reload:{x:0,y:0,r:34,id:null,down:false,label:'R'},swap:{x:0,y:0,r:34,id:null,down:false,label:'↔'},restart:{x:0,y:0,w:220,h:70}};

let audioCtx=null;

function beep(type){if(!audioCtx)return; const t=audioCtx.currentTime,o=audioCtx.createOscillator(),g=audioCtx.createGain(),f=audioCtx.createBiquadFilter(); f.type='lowpass'; f.frequency.value=type==='shot'?900:type==='hit'?500:type==='pickup'?1200:type==='reload'?700:240; o.type=type==='shot'?'sawtooth':type==='dry'?'square':'triangle'; o.frequency.setValueAtTime(type==='shot'?120+R()*80:type==='death'?80:type==='pickup'?880:type==='reload'?360:180,t); o.frequency.exponentialRampToValueAtTime(type==='shot'?38:type==='pickup'?1320:90,t+(type==='reload'?.12:.08)); g.gain.setValueAtTime(type==='shot'?.08:type==='death'?.1:.055,t); g.gain.exponentialRampToValueAtTime(.0001,t+(type==='reload'?.16:.11)); o.connect(f);f.connect(g);g.connect(audioCtx.destination);o.start(t);o.stop(t+.2)}
function resize(){DPR=Math.min(2.2,devicePixelRatio||1);W=innerWidth;H=innerHeight;canvas.width=Math.floor(W*DPR);canvas.height=Math.floor(H*DPR);ctx.setTransform(DPR,0,0,DPR,0,0);landscape=W>H;layoutControls()}
addEventListener('resize',resize,{passive:false}); addEventListener('orientationchange',()=>setTimeout(resize,80),{passive:false});
addEventListener('keydown',e=>{keys[e.key.toLowerCase()]=true;if(e.key==='p')paused=!paused});addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);
addEventListener('blur',()=>{focusPaused=true;paused=true;addMsg('PAUSED - TAP TO RESUME')});addEventListener('focus',()=>{focusPaused=false});

const weapons=[
 {name:'PISTOL',damage:24,mag:12,ammo:84,rate:.28,spread:.045,recoil:85,spd:920,reload:1.05,pellets:1,auto:false,crit:.19},
 {name:'RIFLE',damage:16,mag:30,ammo:150,rate:.095,spread:.035,recoil:52,spd:1120,reload:1.55,pellets:1,auto:true,crit:.14},
 {name:'SHOTGUN',damage:13,mag:6,ammo:42,rate:.62,spread:.19,recoil:165,spd:820,reload:1.8,pellets:7,auto:false,crit:.09}
];
let player,bullets=[],enemies=[],parts=[],shells=[],pickups=[],obstacles=[],decor=[],wave=0,score=0,best=+localStorage.bootCampBest||0,combo=1,comboT=0,state='menu',waveT=0,spawnQueue=0,weaponIndex=0;
function freshWeapons(){return weapons.map(w=>({...w,clip:w.mag,reserve:w.ammo,last:0,reloading:0}))}
let inv=freshWeapons();
function reset(){player={x:240,y:world.h/2,vx:0,vy:0,r:20,hp:100,max:100,ang:0,anim:0,dead:false};bullets=[];enemies=[];parts=[];shells=[];pickups=[];wave=0;score=0;combo=1;comboT=0;weaponIndex=0;inv=freshWeapons();state='play';paused=false;focusPaused=false;makeArena();nextWave();radioMsg('WELCOME TO STICK BOOT CAMP');}
function makeArena(){obstacles=[
 {x:510,y:220,w:220,h:46,t:'sand'}, {x:520,y:720,w:220,h:46,t:'sand'}, {x:890,y:475,w:220,h:54,t:'crate'}, {x:1080,y:260,w:70,h:230,t:'wall'}, {x:1180,y:710,w:260,h:52,t:'sand'}, {x:1390,y:360,w:70,h:210,t:'crate'}, {x:340,y:455,w:95,h:125,t:'crate'}, {x:760,y:150,w:80,h:130,t:'tower'}, {x:1540,y:790,w:80,h:120,t:'tower'}];
 decor=[]; for(let i=0;i<130;i++)decor.push({x:R()*world.w,y:R()*world.h,a:R()*TAU,s:1+R()*3,t:R()<.5?'stone':R()<.7?'track':'mark'});}
function layoutControls(){joy.x=Math.max(86,W*.12);joy.y=H-88;buttons.reload.x=W-156;buttons.reload.y=H-86;buttons.swap.x=W-244;buttons.swap.y=H-86;shoot.x=W-84;shoot.y=H-118;buttons.restart.x=W/2-110;buttons.restart.y=H/2+80}
function addMsg(txt){uiMsgs.push({txt,t:2.1});}
function radioMsg(txt){radio.push({txt,t:3.3});}
function nextWave(){wave++;waveT=2.2;spawnQueue=4+wave*3;addMsg('ВОЛНА '+wave);radioMsg(wave===1?'MOVE! MOVE!':'WAVE INCOMING!');}
function spawnEnemy(){let side=Math.floor(R()*4),x=0,y=0;if(side===0){x=-40;y=R()*world.h}else if(side===1){x=world.w+40;y=R()*world.h}else if(side===2){x=R()*world.w;y=-40}else{x=R()*world.w;y=world.h+40}let roll=R(),type=roll<Math.min(.22+.02*wave,.42)?'rush':roll>.78?'heavy':'soldier';let e={x,y,vx:0,vy:0,r:type==='heavy'?28:19,type,hp:type==='heavy'?120+wave*12:type==='rush'?38+wave*4:58+wave*6,max:0,spd:type==='heavy'?62:type==='rush'?132:86,atk:type==='heavy'?20:12,cool:0,anim:R()*6,dead:false};e.max=e.hp;enemies.push(e)}
function dist(a,b,c,d){return Math.hypot(a-c,b-d)} function clamp(v,a,b){return Math.max(a,Math.min(b,v))} function ang(a,b,c,d){return Math.atan2(d-b,c-a)}
function circleRect(cx,cy,cr,o){let nx=clamp(cx,o.x,o.x+o.w),ny=clamp(cy,o.y,o.y+o.h);return (cx-nx)**2+(cy-ny)**2<cr*cr}
function resolveCircle(o){let cx=o.x,cy=o.y,r=o.r;for(const ob of obstacles)if(circleRect(cx,cy,r,ob)){let nx=clamp(cx,ob.x,ob.x+ob.w),ny=clamp(cy,ob.y,ob.y+ob.h),dx=cx-nx,dy=cy-ny,l=Math.hypot(dx,dy)||1;if(l<.1){let left=Math.abs(cx-ob.x),right=Math.abs(cx-(ob.x+ob.w)),top=Math.abs(cy-ob.y),bot=Math.abs(cy-(ob.y+ob.h)),m=Math.min(left,right,top,bot);if(m===left){dx=-1;dy=0;l=1}else if(m===right){dx=1;dy=0;l=1}else if(m===top){dx=0;dy=-1;l=1}else{dx=0;dy=1;l=1}}let push=r-l+1;o.x+=dx/l*push;o.y+=dy/l*push}}
function rayBlocked(x,y,x2,y2){for(const o of obstacles){let steps=Math.ceil(dist(x,y,x2,y2)/28);for(let i=1;i<=steps;i++){let t=i/steps,px=x+(x2-x)*t,py=y+(y2-y)*t;if(px>o.x&&px<o.x+o.w&&py>o.y&&py<o.y+o.h)return true}}return false}
function shootWeapon(){if(!landscape||state!=='play'||paused)return;initAudio();let w=inv[weaponIndex],now=performance.now()/1000;if(w.reloading>0)return;if(now-w.last<w.rate)return;if(w.clip<=0){beep('dry');radioMsg('RELOAD!'); if(w.reserve>0)reload(); return}w.last=now;w.clip--;let a=player.ang;player.vx-=Math.cos(a)*w.recoil;player.vy-=Math.sin(a)*w.recoil;shake+=w.name==='SHOTGUN'?9:4;beep('shot');for(let i=0;i<w.pellets;i++){let aa=a+(R()-.5)*w.spread*(w.pellets>1?2.2:1),sp=w.spd*(.82+R()*.22);bullets.push({x:player.x+Math.cos(a)*28,y:player.y+Math.sin(a)*28,vx:Math.cos(aa)*sp,vy:Math.sin(aa)*sp,life:w.name==='SHOTGUN'?.42:.75,damage:w.damage,from:'p',crit:R()<w.crit,trail:[]});}
 for(let i=0;i<5;i++)parts.push({x:player.x+Math.cos(a)*34,y:player.y+Math.sin(a)*34,vx:Math.cos(a)*80+(R()-.5)*80,vy:Math.sin(a)*80+(R()-.5)*80,life:.18+R()*.18,max:.35,s:7+R()*8,col:i<2?'#ffd46b':'#6e6251',kind:'smoke'});
 shells.push({x:player.x-Math.sin(a)*8,y:player.y+Math.cos(a)*8,vx:-Math.sin(a)*120+(R()-.5)*90,vy:Math.cos(a)*120+(R()-.5)*90,rot:R()*TAU,vr:(R()-.5)*14,life:1.2});}
function reload(){let w=inv[weaponIndex]; if(w.reloading>0||w.clip===w.mag||w.reserve<=0)return;w.reloading=w.reload;beep('reload');radioMsg('COVER AND RELOAD!')}
function swapWeapon(){weaponIndex=(weaponIndex+1)%inv.length;addMsg(inv[weaponIndex].name);beep('pickup')}
function damageEnemy(e,d,crit){e.hp-=crit?d*2.2:d;shake+=crit?5:2;score+=crit?5:2;for(let i=0;i<(crit?12:7);i++)parts.push({x:e.x,y:e.y,vx:(R()-.5)*220,vy:(R()-.5)*220,life:.45,max:.45,s:2+R()*5,col:crit?'#ff3636':'#b31313',kind:'blood'});beep('hit');if(e.hp<=0&&!e.dead){e.dead=true;score+=Math.floor((e.type==='heavy'?90:e.type==='rush'?45:55)*combo);combo=Math.min(8,combo+.35);comboT=3.2;beep('death'); if(e.type==='heavy')slow=.25; if(R()<.26)drop(e.x,e.y,R()<.5?'med':'ammo');}}
function drop(x,y,type){pickups.push({x,y,type,t:R()*TAU,r:18})}
function update(dt){if(!landscape||state==='menu'||paused)return;dt*=slow>0?.38:1;slow=Math.max(0,slow-dt);if(waveT>0)waveT-=dt;if(spawnQueue>0&&waveT<=0){let n=Math.min(spawnQueue,Math.ceil(dt*2.4+R()*1.5));for(let i=0;i<n;i++)if(R()<.045+wave*.006){spawnEnemy();spawnQueue--}}if(comboT>0){comboT-=dt;if(comboT<=0)combo=1}
 let mx=joy.dx,my=joy.dy;if(keys.w||keys.arrowup)my-=1;if(keys.s||keys.arrowdown)my+=1;if(keys.a||keys.arrowleft)mx-=1;if(keys.d||keys.arrowright)mx+=1;let ml=Math.hypot(mx,my);if(ml>1){mx/=ml;my/=ml}player.vx+=mx*660*dt;player.vy+=my*660*dt;player.vx*=Math.pow(.001,dt);player.vy*=Math.pow(.001,dt);player.x+=player.vx*dt;player.y+=player.vy*dt;player.x=clamp(player.x,30,world.w-30);player.y=clamp(player.y,30,world.h-30);resolveCircle(player);player.anim+=dt*(3+ml*7);
 let targetX=shoot.down?screenToWorld(shoot.x,shoot.y).x:player.x+1,targetY=shoot.down?screenToWorld(shoot.x,shoot.y).y:player.y;if(shoot.down)player.ang=ang(player.x,player.y,targetX,targetY);else if(ml>.12)player.ang=Math.atan2(my,mx);if(shoot.down){let w=inv[weaponIndex]; if(w.auto)shootWeapon()}for(const w of inv)if(w.reloading>0){w.reloading-=dt;if(w.reloading<=0){let need=w.mag-w.clip,take=Math.min(need,w.reserve);w.clip+=take;w.reserve-=take;w.reloading=0;beep('reload')}}
 for(let i=bullets.length-1;i>=0;i--){let b=bullets[i];b.life-=dt;b.trail.push([b.x,b.y]);if(b.trail.length>4)b.trail.shift();b.x+=b.vx*dt;b.y+=b.vy*dt;let gone=b.life<=0||b.x<0||b.y<0||b.x>world.w||b.y>world.h,hit=false;if(!gone){for(const o of obstacles)if(b.x>o.x&&b.x<o.x+o.w&&b.y>o.y&&b.y<o.y+o.h){sparks(b.x,b.y);gone=true;hit=true;break}}if(!gone){for(const e of enemies)if(!e.dead&&dist(b.x,b.y,e.x,e.y)<e.r+4){damageEnemy(e,b.damage,b.crit);gone=true;hit=true;break}}if(gone)bullets.splice(i,1)}
 for(let i=enemies.length-1;i>=0;i--){let e=enemies[i];if(e.dead){e.anim+=dt*8;if(e.anim>7)enemies.splice(i,1);continue}e.anim+=dt*8;e.cool-=dt;let a=ang(e.x,e.y,player.x,player.y),blocked=rayBlocked(e.x,e.y,player.x,player.y);let tx=Math.cos(a),ty=Math.sin(a);if(blocked){for(const o of obstacles){if(circleRect(e.x+tx*34,e.y+ty*34,e.r+7,o)){let s=R()<.5?-1:1,oa=a+s*PI/2;tx=Math.cos(oa);ty=Math.sin(oa);break}}}e.vx+=(tx*e.spd*5)*dt;e.vy+=(ty*e.spd*5)*dt;e.vx*=Math.pow(.03,dt);e.vy*=Math.pow(.03,dt);e.x+=e.vx*dt;e.y+=e.vy*dt;resolveCircle(e);if(dist(e.x,e.y,player.x,player.y)<e.r+player.r+8&&e.cool<=0){e.cool=.72;player.hp-=e.atk;shake+=9;beep('hit');radioMsg('KEEP MOVING!');for(let k=0;k<8;k++)parts.push({x:player.x,y:player.y,vx:(R()-.5)*180,vy:(R()-.5)*180,life:.35,max:.35,s:3,col:'#d71919',kind:'blood'});if(player.hp<=0)gameOver()}}
 for(let i=pickups.length-1;i>=0;i--){let p=pickups[i];p.t+=dt*5;if(dist(p.x,p.y,player.x,player.y)<36){if(p.type==='med')player.hp=Math.min(player.max,player.hp+34);else for(const w of inv)w.reserve+=Math.floor(w.mag*1.6);score+=20;beep('pickup');addMsg(p.type==='med'?'+HEALTH':'+AMMO');pickups.splice(i,1)}}
 updateArr(parts,dt); updateArr(shells,dt); uiMsgs.forEach(m=>m.t-=dt); for(let i=uiMsgs.length-1;i>=0;i--)if(uiMsgs[i].t<=0)uiMsgs.splice(i,1);radio.forEach(m=>m.t-=dt);for(let i=radio.length-1;i>=0;i--)if(radio[i].t<=0)radio.splice(i,1);
 if(spawnQueue<=0&&enemies.filter(e=>!e.dead).length===0&&state==='play'){addMsg('ВОЛНА ЗАЧИЩЕНА');radioMsg('WAVE CLEAR!');waveT=2.6;spawnQueue=-1;setTimeout(()=>{if(state==='play')nextWave()},1500)} }
function updateArr(a,dt){for(let i=a.length-1;i>=0;i--){let p=a[i];p.life-=dt;p.x+=(p.vx||0)*dt;p.y+=(p.vy||0)*dt;p.vx*=Math.pow(.08,dt);p.vy*=Math.pow(.08,dt);if('rot'in p){p.rot+=p.vr*dt;p.vy+=260*dt}if(p.life<=0)a.splice(i,1)}}
function sparks(x,y){shake+=2;for(let i=0;i<10;i++)parts.push({x,y,vx:(R()-.5)*260,vy:(R()-.5)*260,life:.25,max:.25,s:2+R()*4,col:'#ffd45f',kind:'spark'})}
function gameOver(){state='over';player.dead=true;best=Math.max(best,score);localStorage.bootCampBest=best;radioMsg('CADET DOWN!')}
function screenToWorld(x,y){return{x:x+cam.x-W/2,y:y+cam.y-H/2}}
function worldToScreen(x,y){return{x:x-cam.x+W/2,y:y-cam.y+H/2}}
function draw(){ctx.setTransform(DPR,0,0,DPR,0,0);ctx.fillStyle='#17100a';ctx.fillRect(0,0,W,H);if(!landscape)return;let sx=(R()-.5)*shake,sy=(R()-.5)*shake;shake*=.88;if(shake<.05)shake=0;cam.x+=((player?player.x:world.w/2)-cam.x)*.08;cam.y+=((player?player.y:world.h/2)-cam.y)*.08;cam.x=clamp(cam.x,W/2,world.w-W/2);cam.y=clamp(cam.y,H/2,world.h-H/2);ctx.save();ctx.translate(W/2-cam.x+sx,H/2-cam.y+sy);drawArena();for(const p of pickups)drawPickup(p);for(const s of shells)drawShell(s);for(const b of bullets)drawBullet(b);for(const e of enemies)drawStick(e);if(player)drawStick(player,true);for(const p of parts)drawPart(p);ctx.restore();drawHUD();drawControls();if(state==='menu')drawMenu();if(paused&&state==='play')drawPause();if(state==='over')drawOver();}
function drawArena(){ctx.fillStyle='#c69a58';ctx.fillRect(0,0,world.w,world.h);ctx.globalAlpha=.12;ctx.strokeStyle='#7b552d';ctx.lineWidth=2;for(let x=0;x<world.w;x+=80){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,world.h);ctx.stroke()}for(let y=0;y<world.h;y+=80){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(world.w,y);ctx.stroke()}ctx.globalAlpha=1;for(const d of decor){ctx.save();ctx.translate(d.x,d.y);ctx.rotate(d.a);ctx.globalAlpha=.18;if(d.t==='track'){ctx.fillStyle='#5c4429';ctx.fillRect(-12,-2,24,4)}else if(d.t==='mark'){ctx.strokeStyle='#fff2';ctx.beginPath();ctx.arc(0,0,d.s*3,0,PI);ctx.stroke()}else{ctx.fillStyle='#5b4023';ctx.beginPath();ctx.arc(0,0,d.s,0,TAU);ctx.fill()}ctx.restore()}drawTargets();for(const o of obstacles)drawObstacle(o);ctx.strokeStyle='#2b2015';ctx.lineWidth=18;ctx.strokeRect(0,0,world.w,world.h)}
function drawTargets(){for(let i=0;i<6;i++){let x=1460+i%2*120,y=120+Math.floor(i/2)*115;ctx.fillStyle='#3b2b1b';ctx.fillRect(x-5,y,10,70);ctx.fillStyle='#eee';ctx.beginPath();ctx.arc(x,y,28,0,TAU);ctx.fill();ctx.strokeStyle='#c33';ctx.lineWidth=6;ctx.beginPath();ctx.arc(x,y,20,0,TAU);ctx.stroke();ctx.beginPath();ctx.arc(x,y,8,0,TAU);ctx.stroke()}}
function drawObstacle(o){ctx.save();ctx.shadowColor='#0006';ctx.shadowBlur=12;ctx.shadowOffsetY=7;if(o.t==='sand'){for(let x=o.x+12;x<o.x+o.w-6;x+=31){ctx.fillStyle='#8b6c40';roundRect(x,o.y+5,34,o.h-10,11,true);ctx.strokeStyle='#594125';ctx.stroke()}}else if(o.t==='tower'){ctx.fillStyle='#5d4025';roundRect(o.x,o.y,o.w,o.h,8,true);ctx.strokeStyle='#25180d';ctx.lineWidth=4;ctx.stroke();ctx.strokeStyle='#2b1b10';ctx.beginPath();ctx.moveTo(o.x+8,o.y+10);ctx.lineTo(o.x+o.w-8,o.y+o.h-10);ctx.moveTo(o.x+o.w-8,o.y+10);ctx.lineTo(o.x+8,o.y+o.h-10);ctx.stroke()}else{ctx.fillStyle='#8a5b2b';roundRect(o.x,o.y,o.w,o.h,8,true);ctx.strokeStyle='#3a2413';ctx.lineWidth=4;ctx.stroke();ctx.strokeStyle='#5e3c1e';ctx.beginPath();ctx.moveTo(o.x+8,o.y+8);ctx.lineTo(o.x+o.w-8,o.y+o.h-8);ctx.moveTo(o.x+o.w-8,o.y+8);ctx.lineTo(o.x+8,o.y+o.h-8);ctx.stroke()}ctx.restore()}
function roundRect(x,y,w,h,r,fill){ctx.beginPath();ctx.roundRect?ctx.roundRect(x,y,w,h,r):(ctx.rect(x,y,w,h)); if(fill)ctx.fill();}
function drawStick(e,isP=false){ctx.save();ctx.translate(e.x,e.y);let a=isP?player.ang:ang(e.x,e.y,player.x,player.y),run=Math.sin(e.anim)*8,dead=e.dead||isP&&player.dead;ctx.rotate(dead?PI/2:a);ctx.lineCap='round';ctx.lineJoin='round';ctx.shadowColor='#0005';ctx.shadowBlur=8;ctx.strokeStyle=isP?'#f7f0d0':e.type==='rush'?'#ff774c':e.type==='heavy'?'#8b3cff':'#242424';ctx.fillStyle=ctx.strokeStyle;ctx.lineWidth=e.type==='heavy'?7:5;if(dead)ctx.globalAlpha=.72;ctx.beginPath();ctx.arc(0,0,e.r*.68,0,TAU);ctx.fill();ctx.beginPath();ctx.moveTo(-e.r*.2,e.r*.7);ctx.lineTo(-e.r*.5,e.r*1.8);ctx.moveTo(-e.r*.4,e.r*1.15);ctx.lineTo(-e.r*.95,e.r*2.05+run*.3);ctx.moveTo(-e.r*.4,e.r*1.15);ctx.lineTo(e.r*.4,e.r*2.05-run*.3);ctx.moveTo(e.r*.05,e.r*.95);ctx.lineTo(e.r*1.2,e.r*.55);ctx.moveTo(e.r*.05,e.r*.95);ctx.lineTo(e.r*1.15,e.r*1.08);ctx.stroke();ctx.strokeStyle=isP?'#1b1b1b':'#111';ctx.lineWidth=5;ctx.beginPath();ctx.moveTo(e.r*.72,e.r*.78);ctx.lineTo(e.r*2.0,e.r*.78);ctx.stroke();if(isP){let w=inv[weaponIndex];ctx.strokeStyle=w.name==='SHOTGUN'?'#452b18':'#20242a';ctx.lineWidth=8;ctx.beginPath();ctx.moveTo(e.r*1.1,e.r*.78);ctx.lineTo(e.r*2.4,e.r*.78);ctx.stroke();}ctx.restore();if(!isP&&!e.dead){let s=worldToScreen(e.x,e.y-e.r-18);ctx.save();ctx.resetTransform&&ctx.resetTransform();ctx.setTransform(DPR,0,0,DPR,0,0);ctx.fillStyle='#0008';ctx.fillRect(s.x-24,s.y,48,6);ctx.fillStyle=e.type==='heavy'?'#b65cff':'#e43';ctx.fillRect(s.x-24,s.y,48*Math.max(0,e.hp/e.max),6);ctx.restore()}}
function drawBullet(b){ctx.strokeStyle=b.crit?'#fffb9a':'#ffe7a0';ctx.lineWidth=b.crit?3:2;ctx.beginPath();let lx=b.x-b.vx*.025,ly=b.y-b.vy*.025;ctx.moveTo(lx,ly);ctx.lineTo(b.x,b.y);ctx.stroke()}
function drawPart(p){ctx.save();ctx.globalAlpha=Math.max(0,p.life/p.max);ctx.fillStyle=p.col;if(p.kind==='smoke'){ctx.beginPath();ctx.arc(p.x,p.y,p.s*(1+p.life),0,TAU);ctx.fill()}else{ctx.beginPath();ctx.arc(p.x,p.y,p.s,0,TAU);ctx.fill()}ctx.restore()}
function drawShell(s){ctx.save();ctx.translate(s.x,s.y);ctx.rotate(s.rot);ctx.fillStyle='#d7ae4f';ctx.fillRect(-5,-2,10,4);ctx.restore()}
function drawPickup(p){ctx.save();ctx.translate(p.x,p.y);let q=1+Math.sin(p.t)*.12;ctx.scale(q,q);ctx.shadowColor=p.type==='med'?'#ff3333':'#ffd633';ctx.shadowBlur=14;if(p.type==='med'){ctx.fillStyle='#fff';roundRect(-16,-13,32,26,7,true);ctx.fillStyle='#e12424';ctx.fillRect(-4,-10,8,20);ctx.fillRect(-11,-3,22,7)}else{ctx.fillStyle='#5f3d20';roundRect(-18,-14,36,28,5,true);ctx.fillStyle='#f0c44f';for(let i=-1;i<=1;i++)ctx.fillRect(i*8-2,-9,4,18)}ctx.restore()}
function drawHUD(){ctx.save();ctx.fillStyle='#0007';roundRect(12,12,280,82,12,true);ctx.fillStyle='#3d1616';roundRect(28,28,190,18,8,true);ctx.fillStyle=player&&player.hp<35?'#f33':'#52e36d';roundRect(28,28,190*Math.max(0,(player?player.hp:100)/100),18,8,true);let w=inv[weaponIndex];ctx.font='bold 15px Arial';ctx.fillStyle='#fff';ctx.fillText('HP '+Math.max(0,Math.ceil(player?player.hp:100))+'  WAVE '+wave+'  SCORE '+score,28,68);ctx.fillText('BEST '+best,205,68);ctx.fillStyle='#0007';roundRect(W-342,12,330,82,12,true);ctx.fillStyle='#fff';ctx.font='bold 20px Arial';ctx.fillText(w.name, W-320,40);ctx.font='bold 25px Arial';ctx.fillText(w.clip+' / '+w.reserve,W-320,72);if(w.reloading>0){ctx.fillStyle='#ffd25c';ctx.fillRect(W-190,61,150*(1-w.reloading/w.reload),10);ctx.font='bold 13px Arial';ctx.fillText('RELOADING',W-188,55)}if(combo>1){ctx.fillStyle='#ffea82';ctx.font='bold 24px Arial';ctx.fillText('COMBO x'+combo.toFixed(1),W/2-70,38)}ctx.font='bold 18px Arial';for(let i=0;i<uiMsgs.length;i++){ctx.globalAlpha=Math.min(1,uiMsgs[i].t);ctx.fillStyle='#fff4c8';ctx.textAlign='center';ctx.fillText(uiMsgs[i].txt,W/2,82+i*28)}ctx.textAlign='left';ctx.globalAlpha=1;if(radio.length){ctx.fillStyle='#0009';roundRect(300,H-38,W-600,28,8,true);ctx.fillStyle='#7dff6a';ctx.font='bold 15px monospace';ctx.fillText('INSTRUCTOR: '+radio[radio.length-1].txt,316,H-18)}ctx.restore()}
function drawControls(){ctx.save();ctx.globalAlpha=.88;ctx.strokeStyle='#fff8';ctx.lineWidth=3;ctx.fillStyle='#0005';ctx.beginPath();ctx.arc(joy.x,joy.y,joy.r,0,TAU);ctx.fill();ctx.stroke();ctx.fillStyle='#fff5';ctx.beginPath();ctx.arc(joy.x+joy.dx*38,joy.y+joy.dy*38,28,0,TAU);ctx.fill();button(shoot.x,shoot.y,64,'FIRE',shoot.down);button(buttons.reload.x,buttons.reload.y,buttons.reload.r,'RELOAD',buttons.reload.down);button(buttons.swap.x,buttons.swap.y,buttons.swap.r,'GUN',buttons.swap.down);ctx.restore()}
function button(x,y,r,label,down){ctx.fillStyle=down?'#ffcf5ccc':'#0007';ctx.strokeStyle='#fff9';ctx.lineWidth=3;ctx.beginPath();ctx.arc(x,y,r,0,TAU);ctx.fill();ctx.stroke();ctx.fillStyle='#fff';ctx.font='bold '+(r>50?17:12)+'px Arial';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(label,x,y)}
function drawMenu(){ctx.save();ctx.fillStyle='#0009';ctx.fillRect(0,0,W,H);ctx.textAlign='center';ctx.fillStyle='#ffe39b';ctx.font='900 42px Arial';ctx.fillText('STICK BOOT CAMP',W/2,H/2-70);ctx.font='bold 18px Arial';ctx.fillStyle='#fff';ctx.fillText('Удерживай FIRE, меняй оружие, используй укрытия. Tap to start.',W/2,H/2-20);ctx.fillText('Рекорд: '+best,W/2,H/2+18);ctx.restore()}
function drawPause(){ctx.save();ctx.fillStyle='#000a';ctx.fillRect(0,0,W,H);ctx.textAlign='center';ctx.fillStyle='#fff3a0';ctx.font='900 38px Arial';ctx.fillText('PAUSED',W/2,H/2-12);ctx.font='bold 18px Arial';ctx.fillStyle='#fff';ctx.fillText('Нажми на экран, чтобы продолжить',W/2,H/2+30);ctx.restore()}
function drawOver(){ctx.save();ctx.fillStyle='#210000cc';ctx.fillRect(0,0,W,H);ctx.textAlign='center';ctx.fillStyle='#ffdddd';ctx.font='900 40px Arial';ctx.fillText('MISSION FAILED',W/2,H/2-82);ctx.fillStyle='#fff';ctx.font='bold 22px Arial';ctx.fillText('Score: '+score+'   Best: '+best,W/2,H/2-38);ctx.fillStyle='#ffc64f';roundRect(buttons.restart.x,buttons.restart.y,buttons.restart.w,buttons.restart.h,18,true);ctx.fillStyle='#241400';ctx.font='900 24px Arial';ctx.fillText('RESTART',W/2,buttons.restart.y+43);ctx.restore()}
function inCircle(x,y,cx,cy,r){return Math.hypot(x-cx,y-cy)<=r} function inRect(x,y,r){return x>r.x&&x<r.x+r.w&&y>r.y&&y<r.y+r.h}
canvas.addEventListener('pointerdown',e=>{initAudio();canvas.setPointerCapture(e.pointerId);let x=e.clientX,y=e.clientY;if(!landscape)return;if(state==='menu'){reset();return}if(paused&&state==='play'){paused=false;return}if(state==='over'&&inRect(x,y,buttons.restart)){reset();return}if(x<W*.45){joy.id=e.pointerId;joy.active=true;joy.x=x;joy.y=y;joy.dx=joy.dy=0;return}if(inCircle(x,y,buttons.reload.x,buttons.reload.y,buttons.reload.r+18)){buttons.reload.id=e.pointerId;buttons.reload.down=true;reload();return}if(inCircle(x,y,buttons.swap.x,buttons.swap.y,buttons.swap.r+18)){buttons.swap.id=e.pointerId;buttons.swap.down=true;swapWeapon();return}shoot.id=e.pointerId;shoot.down=true;shoot.x=x;shoot.y=y;player.ang=ang(player.x,player.y,screenToWorld(x,y).x,screenToWorld(x,y).y);shootWeapon();},{passive:false});
canvas.addEventListener('pointermove',e=>{let x=e.clientX,y=e.clientY;if(e.pointerId===joy.id){let dx=x-joy.x,dy=y-joy.y,l=Math.hypot(dx,dy),m=Math.min(1,l/joy.r);joy.dx=l?dx/l*m:0;joy.dy=l?dy/l*m:0}else if(e.pointerId===shoot.id){shoot.x=x;shoot.y=y}},{passive:false});
function up(e){if(e.pointerId===joy.id){joy.id=null;joy.active=false;joy.dx=joy.dy=0}if(e.pointerId===shoot.id){shoot.id=null;shoot.down=false}for(const k of ['reload','swap'])if(e.pointerId===buttons[k].id){buttons[k].id=null;buttons[k].down=false}}
canvas.addEventListener('pointerup',up,{passive:false});canvas.addEventListener('pointercancel',up,{passive:false});
function loop(t){let dt=Math.min(.033,(t-last)/1000||.016);last=t;update(dt);draw();requestAnimationFrame(loop)}
resize();makeArena();player={x:240,y:world.h/2,vx:0,vy:0,r:20,hp:100,max:100,ang:0,anim:0};requestAnimationFrame(loop);
})();
</script>
